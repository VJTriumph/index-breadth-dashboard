name: Index Breadth Dashboard

on:
  schedule:
    - cron: "30 3 * * 1-5"   # 9:00 AM IST Mon-Fri
    - cron: "0 10 * * 1-5"   # 3:30 PM IST Mon-Fri
  workflow_dispatch:

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "yfinance>=0.2.40" pandas requests

      - name: Run breadth dashboard
        run: python breadth_dashboard.py

      - name: Commit breadth.json to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/breadth.json breadth_history.json
          git diff --cached --stat
          git diff --cached --quiet || git commit -m "Auto: breadth data $(date +'%Y-%m-%d %H:%M') UTC"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
