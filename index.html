<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index Breadth Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script> 
<style>
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#252836;--accent:#6c63ff;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--text2:#94a3b8;--border:#2d3748;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
header h1{font-size:1.3rem;font-weight:700;color:var(--accent);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.last-updated{font-size:0.8rem;color:var(--text2);}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:0.82rem;font-weight:600;transition:all 0.2s;}
.btn-primary{background:var(--accent);color:white;}
.btn-primary:hover{opacity:0.85;}
.btn-success{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.btn-success:hover{background:rgba(34,197,94,0.25);}
.loading-bar{height:3px;background:var(--border);overflow:hidden;}
.loading-bar-fill{height:100%;background:var(--accent);width:0%;transition:width 0.3s;}
.tabs-wrapper{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px;overflow-x:auto;}
.tab-btn{padding:11px 18px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:0.88rem;border-bottom:3px solid transparent;transition:all 0.2s;font-weight:500;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{display:none;padding:20px 24px;}
.tab-content.active{display:block;}
.error-banner{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:14px 18px;margin-bottom:18px;color:var(--red);font-size:0.85rem;}
.warn-banner{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:14px 18px;margin-bottom:18px;color:var(--yellow);font-size:0.85rem;}
.error-banner h4{margin-bottom:6px;font-size:0.9rem;}
.error-list{list-style:none;display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.error-list li{background:rgba(239,68,68,0.15);padding:2px 8px;border-radius:4px;font-size:0.78rem;}
.section-title{font-size:1rem;font-weight:600;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:4px;height:16px;background:var(--accent);border-radius:2px;}
.cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;}
.card .label{font-size:0.75rem;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.card .value{font-size:1.8rem;font-weight:700;}
.card .sub{font-size:0.78rem;color:var(--text2);margin-top:3px;}
.card .bar{height:5px;background:var(--border);border-radius:3px;margin-top:10px;overflow:hidden;}
.card .bar-fill{height:100%;border-radius:3px;transition:width 0.5s;}
.green{color:var(--green);}
.red{color:var(--red);}
.yellow{color:var(--yellow);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;}
.panel h3{font-size:0.82rem;font-weight:600;margin-bottom:14px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;}
.history-tabs{display:flex;gap:5px;margin-bottom:14px;}
.htab{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-size:0.78rem;transition:all 0.2s;}
.htab.active,.htab:hover{background:var(--accent);color:white;border-color:var(--accent);}
.chart-container{position:relative;height:180px;}
.stock-table{width:100%;border-collapse:collapse;}
.stock-table th{font-size:0.72rem;color:var(--text2);text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);text-transform:uppercase;white-space:nowrap;}
.stock-table td{padding:7px 10px;font-size:0.82rem;border-bottom:1px solid rgba(45,55,72,0.4);}
.stock-table tr:last-child td{border-bottom:none;}
.stock-table tr:hover td{background:var(--bg3);}
.badge{display:inline-block;padding:1px 7px;border-radius:4px;font-size:0.72rem;font-weight:600;}
.badge-green{background:rgba(34,197,94,0.15);color:var(--green);}
.badge-red{background:rgba(239,68,68,0.15);color:var(--red);}
.badge-yellow{background:rgba(245,158,11,0.15);color:var(--yellow);}
.badge-gray{background:rgba(148,163,184,0.15);color:var(--text2);}
.breadth-history-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.history-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.history-card .period{font-size:0.7rem;color:var(--text2);margin-bottom:4px;text-transform:uppercase;}
.history-card .val{font-size:1.3rem;font-weight:700;}
.history-card .chg{font-size:0.7rem;margin-top:3px;}
.tags-wrap{display:flex;flex-wrap:wrap;gap:4px;}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:0.74rem;}
.tag-high{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.25);}
.tag-low{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:768px){.grid-2{grid-template-columns:1fr;}.cards-row{grid-template-columns:repeat(2,1fr);}.breadth-history-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<header>
  <h1>Index Breadth Dashboard</h1>
  <div class="header-right">
    <span class="last-updated">Updated: <span id="lastUpdated">Loading...</span></span>
    <button class="btn btn-primary" onclick="refreshAll()">Refresh Data</button>
    <button class="btn btn-success" onclick="exportAllExcel()">Export All Excel</button>
  </div>
</header>
<div class="loading-bar"><div class="loading-bar-fill" id="loadingBar"></div></div>
<div id="globalError"></div>
<div class="tabs-wrapper" id="indexTabs"></div>
<div id="tabContents"></div>
<script>
const CSV_FILES=[
  {file:'NIFTY 100.csv',name:'Nifty 100',indexKey:'NIFTY 100'},
  {file:'NIFTY MIDCAP 150.csv',name:'Nifty Midcap 150',indexKey:'NIFTY MIDCAP 150'},
  {file:'nifty microcap 250.csv',name:'Nifty Microcap 250',indexKey:'NIFTY MICROCAP 250'},
  {file:'nifty smallcap 250.csv',name:'Nifty Smallcap 250',indexKey:'NIFTY SMALLCAP 250'}
];
const DATA_BASE='https://raw.githubusercontent.com/VJTriumph/index-breadth-dashboard/main/data/';
const appState={indices:{},charts:{},histPeriod:{}};
function parseCSV(text,indexKey){
const lines=text.trim().split(/\r?\n/);
if(lines.length<2)return[];
const symbols=[];
for(let i=1;i<lines.length;i++){
const cols=lines[i].split(',');
if(cols.length>=2){
let sym=cols[1].trim().replace(/"/g,'').toUpperCase();
if(sym&&sym!=='STOCKS'&&sym!=='INDEX'&&sym.length>1)symbols.push(sym);
}
}
return[...new Set(symbols)];
}
async function fetchQuote(symbol){
const ns=symbol+'.NS';
const yUrls=[
'https://corsproxy.io/?url='+encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+ns+'?interval=1d&range=1y'),
'https://corsproxy.io/?url='+encodeURIComponent('https://query2.finance.yahoo.com/v8/finance/chart/'+ns+'?interval=1d&range=1y'),
'https://api.allorigins.win/raw?url='+encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+ns+'?interval=1d&range=1y')
];
for(const url of yUrls){
try{
const r=await fetch(url,{headers:{Accept:'application/json'},signal:AbortSignal.timeout(15000)});
if(!r.ok)continue;
const j=await r.json();
const res=j?.chart?.result?.[0];
if(!res)continue;
const closes=(res.indicators?.quote?.[0]?.close||[]).filter(c=>c!=null);
if(closes.length<5)continue;
const price=res.meta.regularMarketPrice||closes[closes.length-1];
const prev=res.meta.previousClose||closes[closes.length-2]||price;
const chg=price-prev,chgPct=(chg/prev)*100;
const high52=Math.max(...closes),low52=Math.min(...closes);
function sma(n){if(closes.length<n)return null;return closes.slice(-n).reduce((a,b)=>a+b,0)/n;}
const s20=sma(20),s50=sma(50),s200=sma(200);
return{symbol,price:+price.toFixed(2),changePct:+chgPct.toFixed(2),
sma20:s20?+s20.toFixed(2):null,sma50:s50?+s50.toFixed(2):null,sma200:s200?+s200.toFixed(2):null,
aboveSma20:s20?price>s20:null,aboveSma50:s50?price>s50:null,aboveSma200:s200?price>s200:null,
high52:+high52.toFixed(2),low52:+low52.toFixed(2),
nearHigh:price/high52>=0.95,nearLow:price<=low52*1.05,error:null};
}catch(e){continue;}
}
return{symbol,error:'All sources failed',price:null,changePct:null,aboveSma20:null,aboveSma50:null,aboveSma200:null,nearHigh:false,nearLow:false};
}
async function fetchAll(syms,onProg){
  const res={};
  for(let i=0;i<syms.length;i+=5){
    const batch=syms.slice(i,i+5);
    const br=await Promise.all(batch.map(s=>fetchQuote(s)));
    br.forEach(r=>{res[r.symbol]=r;});
    if(onProg)onProg(Math.min(i+5,syms.length),syms.length);
    await new Promise(r=>setTimeout(r,300));
  }
  return res;
}
function breadth(stocks){
  const v=Object.values(stocks).filter(s=>!s.error);
  const n=v.length;
  if(!n)return null;
  const a20=v.filter(s=>s.aboveSma20===true).length;
  const a50=v.filter(s=>s.aboveSma50===true).length;
  const a200=v.filter(s=>s.aboveSma200===true).length;
  const errs=Object.values(stocks).filter(s=>s.error);
  return{total:Object.keys(stocks).length,valid:n,errors:errs,
    above20:a20,above50:a50,above200:a200,
    above20Pct:+((a20/n)*100).toFixed(1),above50Pct:+((a50/n)*100).toFixed(1),above200Pct:+((a200/n)*100).toFixed(1),
    nearHigh:v.filter(s=>s.nearHigh),nearLow:v.filter(s=>s.nearLow)};
}
function color(p){return p>=60?'var(--green)':p>=40?'var(--yellow)':'var(--red)';}
function recHist(name,b){
  const k='bh_'+name;
  let h=JSON.parse(localStorage.getItem(k)||'[]');
  h.push({ts:Date.now(),a20:b.above20Pct,a50:b.above50Pct,a200:b.above200Pct});
  h=h.filter(x=>x.ts>Date.now()-90*864e5);
  localStorage.setItem(k,JSON.stringify(h));
  return h;
}
function getPH(hist,period){
  const ms={1:864e5,'1W':7*864e5,'1M':30*864e5,'3M':90*864e5};
  const cut=Date.now()-ms[period]||ms['1M'];
  return hist.filter(x=>x.ts>=cut);
}
function exportExcel(name,stocks){
  const rows=[['Symbol','Price','Change%','SMA20','SMA50','SMA200','Above SMA20','Above SMA50','Above SMA200','52W High','52W Low','Near 52W High','Near 52W Low','Error']];
  Object.values(stocks).forEach(s=>rows.push([s.symbol,s.price,s.changePct,s.sma20,s.sma50,s.sma200,
    s.aboveSma20===true?'YES':s.aboveSma20===false?'NO':'N/A',
    s.aboveSma50===true?'YES':s.aboveSma50===false?'NO':'N/A',
    s.aboveSma200===true?'YES':s.aboveSma200===false?'NO':'N/A',
    s.high52,s.low52,s.nearHigh?'YES':'NO',s.nearLow?'YES':'NO',s.error||'']));
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[10,10,10,10,10,10,12,12,13,10,10,14,13,30].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,name.substring(0,31));
  XLSX.writeFile(wb,name.replace(/s+/g,'_')+'_'+new Date().toISOString().split('T')[0]+'.xlsx');
}
function exportAllExcel(){
  const wb=XLSX.utils.book_new();
  const sumR=[['Index','Total','Valid','Errors','Above 20 SMA%','Above 50 SMA%','Above 200 SMA%','Near 52H','Near 52L','Updated']];
  CSV_FILES.forEach(cfg=>{
    const d=appState.indices[cfg.name];if(!d)return;
    const b=breadth(d);if(!b)return;
    sumR.push([cfg.name,b.total,b.valid,b.errors.length,b.above20Pct+'%',b.above50Pct+'%',b.above200Pct+'%',b.nearHigh.length,b.nearLow.length,new Date().toLocaleString()]);
    const rows=[['Symbol','Price','Change%','SMA20','SMA50','SMA200','Above SMA20','Above SMA50','Above SMA200','52W High','52W Low','Near 52H','Near 52L','Error']];
    Object.values(d).forEach(s=>rows.push([s.symbol,s.price,s.changePct,s.sma20,s.sma50,s.sma200,
      s.aboveSma20===true?'YES':s.aboveSma20===false?'NO':'N/A',
      s.aboveSma50===true?'YES':s.aboveSma50===false?'NO':'N/A',
      s.aboveSma200===true?'YES':s.aboveSma200===false?'NO':'N/A',
      s.high52,s.low52,s.nearHigh?'YES':'NO',s.nearLow?'YES':'NO',s.error||'']));
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[10,10,10,10,10,10,12,12,13,10,10,10,10,30].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,cfg.name.substring(0,31));
  });
  const ws=XLSX.utils.aoa_to_sheet(sumR);
  ws['!cols']=[22,8,8,8,14,14,15,10,10,20].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws,'Summary');
  XLSX.writeFile(wb,'Index_Breadth_'+new Date().toISOString().split('T')[0]+'.xlsx');
}
function buildTabs(){
  const te=document.getElementById('indexTabs'),ce=document.getElementById('tabContents');
  te.innerHTML='';ce.innerHTML='';
  CSV_FILES.forEach((cfg,i)=>{
    const b=document.createElement('button');
    b.className='tab-btn'+(i===0?' active':'');b.id='tbtn-'+i;
    b.innerHTML=cfg.name+' <span class="spinner" id="sp-'+i+'" style="display:none"></span>';
    b.onclick=()=>switchTab(i);te.appendChild(b);
    const d=document.createElement('div');
    d.className='tab-content'+(i===0?' active':'');d.id='tab-'+i;
    d.innerHTML='<div style="text-align:center;padding:40px;color:var(--text2)">Loading...</div>';
    ce.appendChild(d);
  });
}
function switchTab(idx){
  CSV_FILES.forEach((_,i)=>{
    document.getElementById('tbtn-'+i)?.classList.toggle('active',i===idx);
    document.getElementById('tab-'+i)?.classList.toggle('active',i===idx);
  });
  if(appState.indices[CSV_FILES[idx].name])renderTab(idx);
}
function renderTab(idx){
  const cfg=CSV_FILES[idx];
  const stocks=appState.indices[cfg.name];
  if(!stocks)return;
  const b=breadth(stocks);
  if(!b){document.getElementById('tab-'+idx).innerHTML='<div class="error-banner"><h4>No data</h4></div>';return;}
  const hist=JSON.parse(localStorage.getItem('bh_'+cfg.name)||'[]');
  const period=appState.histPeriod[cfg.name]||'1D';
  const nhSym=b.nearHigh.map(s=>s.symbol);
  const nlSym=b.nearLow.map(s=>s.symbol);
  let errHtml='';
  if(b.errors.length>0){
    errHtml='<div class="error-banner"><h4>Data errors for '+b.errors.length+' stocks:</h4><ul class="error-list">'+b.errors.map(e=>'<li title="'+e.error+'">'+e.symbol+'</li>').join('')+'</ul></div>';
  }
  const rows=Object.values(stocks).map(s=>{
    const cc=s.changePct>=0?'green':'red';
    const sg=s.changePct>=0?'+':'';
    const sb=(lbl,ab)=>ab===null?'<span class="badge badge-gray">'+lbl+'</span>':ab?'<span class="badge badge-green">'+lbl+' YES</span>':'<span class="badge badge-red">'+lbl+' NO</span>';
    return '<tr><td><strong>'+s.symbol+'</strong></td><td>'+(s.price?'Rs'+s.price:'—')+'</td><td class="'+cc+'">'+(s.changePct!=null?sg+s.changePct+'%':'—')+'</td><td>'+(s.sma20||'—')+'</td><td>'+(s.sma50||'—')+'</td><td>'+(s.sma200||'—')+'</td><td>'+sb('20',s.aboveSma20)+' '+sb('50',s.aboveSma50)+' '+sb('200',s.aboveSma200)+'</td><td>'+(s.nearHigh?'<span class="badge badge-green">52H</span>':'')+(s.nearLow?' <span class="badge badge-red">52L</span>':'')+'</td><td>'+(s.error?'<span class="badge badge-red" title="'+s.error+'">ERR</span>':'<span class="badge badge-green">OK</span>')+'</td></tr>';
  }).join('');
  const histSec=renderHist(idx,cfg.name,hist,period);
  document.getElementById('tab-'+idx).innerHTML=errHtml+
    '<div class="section-title">Breadth Summary — '+cfg.name+' ('+b.valid+'/'+b.total+' stocks)</div>'+
    '<div class="cards-row">'+
    '<div class="card"><div class="label">Above 20 SMA</div><div class="value" style="color:'+color(b.above20Pct)+'">'+b.above20Pct+'%</div><div class="sub">'+b.above20+'/'+b.valid+'</div><div class="bar"><div class="bar-fill" style="width:'+b.above20Pct+'%;background:'+color(b.above20Pct)+'"></div></div></div>'+
    '<div class="card"><div class="label">Above 50 SMA</div><div class="value" style="color:'+color(b.above50Pct)+'">'+b.above50Pct+'%</div><div class="sub">'+b.above50+'/'+b.valid+'</div><div class="bar"><div class="bar-fill" style="width:'+b.above50Pct+'%;background:'+color(b.above50Pct)+'"></div></div></div>'+
    '<div class="card"><div class="label">Above 200 SMA</div><div class="value" style="color:'+color(b.above200Pct)+'">'+b.above200Pct+'%</div><div class="sub">'+b.above200+'/'+b.valid+'</div><div class="bar"><div class="bar-fill" style="width:'+b.above200Pct+'%;background:'+color(b.above200Pct)+'"></div></div></div>'+
    '<div class="card"><div class="label">Near 52W High</div><div class="value green">'+b.nearHigh.length+'</div><div class="sub">'+((b.nearHigh.length/b.valid)*100).toFixed(1)+'%</div></div>'+
    '<div class="card"><div class="label">Near 52W Low</div><div class="value red">'+b.nearLow.length+'</div><div class="sub">'+((b.nearLow.length/b.valid)*100).toFixed(1)+'%</div></div>'+
    '</div>'+
    '<div class="grid-2">'+
    '<div class="panel"><h3>Near 52-Week High (within 5%)</h3><div class="tags-wrap">'+(nhSym.length?nhSym.map(s=>'<span class="tag tag-high">'+s+'</span>').join(''):'<span style="color:var(--text2)">None</span>')+'</div></div>'+
    '<div class="panel"><h3>Near 52-Week Low (within 5%)</h3><div class="tags-wrap">'+(nlSym.length?nlSym.map(s=>'<span class="tag tag-low">'+s+'</span>').join(''):'<span style="color:var(--text2)">None</span>')+'</div></div>'+
    '</div>'+
    '<div class="section-title">Breadth History</div>'+histSec+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div class="section-title" style="margin-bottom:0">Stock Details</div>'+
    '<button class="btn btn-success" onclick="exportExcel(\x27"+cfg.name+"\x27,appState.indices[\x27"+cfg.name+"\x27])">Export Excel</button></div>'+
    '<div class="panel"><h3>Individual Stocks — Yahoo Finance Data</h3><div style="overflow-x:auto"><table class="stock-table"><thead><tr><th>Symbol</th><th>Price</th><th>Chg%</th><th>SMA20</th><th>SMA50</th><th>SMA200</th><th>SMA Status</th><th>52W</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  initCharts(idx,cfg.name,hist,period);
}
function renderHist(idx,name,hist,period){
  const types=[{k:'a20',l:'Above 20 SMA',c:'rgba(108,99,255,1)',f:'rgba(108,99,255,0.15)'},
               {k:'a50',l:'Above 50 SMA',c:'rgba(34,197,94,1)',f:'rgba(34,197,94,0.15)'},
               {k:'a200',l:'Above 200 SMA',c:'rgba(245,158,11,1)',f:'rgba(245,158,11,0.15)'}];
  return types.map(t=>{
    const periods=['1D','1W','1M','3M'];
    const cards=periods.map(p=>{
      const ph=getPH(hist,p);
      const cur=ph.length?ph[ph.length-1][t.k]:null;
      const prv=ph.length>1?ph[ph.length-2][t.k]:null;
      const chg=cur!=null&&prv!=null?(cur-prv).toFixed(1):null;
      return '<div class="history-card"><div class="period">'+p+'</div><div class="val" style="color:'+(cur!=null?color(cur):'var(--text2)')+'">'+
        (cur!=null?cur+'%':'—')+'</div>'+(chg!=null?'<div class="chg '+(parseFloat(chg)>=0?'green':'red')+'">'+(parseFloat(chg)>=0?'+':'')+chg+'%</div>':'<div class="chg" style="color:var(--text2)">—</div>')+'</div>';
    }).join('');
    const htabs=periods.map(p=>'<button class="htab '+(p===period?'active':'')+' " onclick="switchPeriod('+idx+',\x27"+name+"\x27,\x27"+t.k+"\x27,\x27"+p+"\x27)">'+p+'</button>').join('');
    return '<div class="panel" style="margin-bottom:16px"><h3>'+t.l+' — History</h3><div class="breadth-history-grid">'+cards+'</div><div class="history-tabs" id="ht-'+idx+'-'+t.k+'">'+htabs+'</div><div class="chart-container"><canvas id="ch-'+idx+'-'+t.k+'"></canvas></div></div>';
  }).join('');
}
function initCharts(idx,name,hist,period){
  const types=[{k:'a20',c:'rgba(108,99,255,1)',f:'rgba(108,99,255,0.15)'},
               {k:'a50',c:'rgba(34,197,94,1)',f:'rgba(34,197,94,0.15)'},
               {k:'a200',c:'rgba(245,158,11,1)',f:'rgba(245,158,11,0.15)'}];
  types.forEach(t=>{
    const el=document.getElementById('ch-'+idx+'-'+t.k);if(!el)return;
    const key='ch-'+idx+'-'+t.k;
    if(appState.charts[key]){try{appState.charts[key].destroy();}catch(e){}}
    const ph=getPH(hist,period);
    const labels=ph.map(h=>new Date(h.ts).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}));
    const data=ph.map(h=>h[t.k]);
    appState.charts[key]=new Chart(el.getContext('2d'),{
      type:'line',data:{labels,datasets:[{label:'Breadth %',data,borderColor:t.c,backgroundColor:t.f,fill:true,tension:0.4,pointRadius:data.length>20?1:3,borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.y?.toFixed(1)+'%'}}},
        scales:{x:{grid:{color:'rgba(45,55,72,0.5)'},ticks:{color:'#94a3b8',maxTicksLimit:7,font:{size:10}}},
          y:{grid:{color:'rgba(45,55,72,0.5)'},ticks:{color:'#94a3b8',font:{size:10},callback:v=>v+'%'},min:0,max:100}}}
    });
  });
}
function switchPeriod(idx,name,tk,period){
  appState.histPeriod[name]=period;
  const hist=JSON.parse(localStorage.getItem('bh_'+name)||'[]');
  document.querySelectorAll('#ht-'+idx+'-'+tk+' .htab').forEach(b=>b.classList.toggle('active',b.textContent===period));
  const colors={a20:{c:'rgba(108,99,255,1)',f:'rgba(108,99,255,0.15)'},a50:{c:'rgba(34,197,94,1)',f:'rgba(34,197,94,0.15)'},a200:{c:'rgba(245,158,11,1)',f:'rgba(245,158,11,0.15)'}};
  const col=colors[tk];
  const el=document.getElementById('ch-'+idx+'-'+tk);if(!el)return;
  const key='ch-'+idx+'-'+tk;
  if(appState.charts[key]){try{appState.charts[key].destroy();}catch(e){}}
  const ph=getPH(hist,period);
  const labels=ph.map(h=>new Date(h.ts).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}));
  const data=ph.map(h=>h[tk]);
  appState.charts[key]=new Chart(el.getContext('2d'),{type:'line',data:{labels,datasets:[{label:'Breadth %',data,borderColor:col.c,backgroundColor:col.f,fill:true,tension:0.4,pointRadius:data.length>20?1:3,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.y?.toFixed(1)+'%'}}},
      scales:{x:{grid:{color:'rgba(45,55,72,0.5)'},ticks:{color:'#94a3b8',maxTicksLimit:7,font:{size:10}}},y:{grid:{color:'rgba(45,55,72,0.5)'},ticks:{color:'#94a3b8',font:{size:10},callback:v=>v+'%'},min:0,max:100}}}});
}
async function loadIdx(i){
  const cfg=CSV_FILES[i];
  const sp=document.getElementById('sp-'+i);if(sp)sp.style.display='inline-block';
  try{
    const cr=await fetch(DATA_BASE+encodeURIComponent(cfg.file));
    if(!cr.ok)throw new Error('CSV HTTP '+cr.status);
    const syms=parseCSV(await cr.text(),cfg.indexKey);
    if(!syms.length)throw new Error('No symbols in CSV');
    document.getElementById('tab-'+i).innerHTML='<div style="text-align:center;padding:30px;color:var(--text2)"><div class="spinner" style="width:24px;height:24px;border-width:3px;margin:0 auto 12px"></div>Loading '+syms.length+' stocks...<br><small id="pr-'+i+'">0/'+syms.length+'</small></div>';
    const quotes=await fetchAll(syms,(done,total)=>{
      const el=document.getElementById('pr-'+i);if(el)el.textContent=done+'/'+total;
      document.getElementById('loadingBar').style.width=(done/total*100)+'%';
    });
    appState.indices[cfg.name]=quotes;
    const b=breadth(quotes);
    if(b)recHist(cfg.name,b);
    renderTab(i);
  }catch(e){
    document.getElementById('tab-'+i).innerHTML='<div class="error-banner"><h4>Failed: '+cfg.name+'</h4>'+e.message+'</div>';
  }finally{if(sp)sp.style.display='none';}
}
async function refreshAll(){
  document.getElementById('loadingBar').style.width='0%';
  for(let i=0;i<CSV_FILES.length;i++)await loadIdx(i);
  document.getElementById('loadingBar').style.width='100%';
  document.getElementById('lastUpdated').textContent=new Date().toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  setTimeout(()=>{document.getElementById('loadingBar').style.width='0%';},2000);
}
window.addEventListener('DOMContentLoaded',()=>{buildTabs();refreshAll();});
</script>
